<html style="width:1024px;height:1024px;margin:0;padding:0;overflow:hidden">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1024px;
  height: 1024px;
  background: #0C0C11;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
.bg-glow {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 58% 52% at 50% 48%,
    rgba(64, 148, 255, 0.22) 0%,
    rgba(64, 148, 255, 0.08) 42%,
    transparent 72%
  );
}
.bolt-wrap {
  position: relative;
  z-index: 2;
  filter:
    drop-shadow(0 0 18px rgba(80, 165, 255, 1.0))
    drop-shadow(0 0 48px rgba(64, 148, 255, 0.70))
    drop-shadow(0 0 100px rgba(40, 120, 240, 0.30));
}
</style>
<body>
  <div class="bg-glow"></div>
  <div class="bolt-wrap">
    <svg width="360" height="492" viewBox="0 0 72 98" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bg" x1="28%" y1="0%" x2="72%" y2="100%">
          <stop offset="0%"   stop-color="#C2DEFF"/>
          <stop offset="30%"  stop-color="#5AAFFF"/>
          <stop offset="70%"  stop-color="#3B93FF"/>
          <stop offset="100%" stop-color="#1558D0"/>
        </linearGradient>
      </defs>
      <!-- Bold lightning bolt: chunky, slightly wide proportions -->
      <polygon points="50,2 13,52 38,52 22,96 59,44 34,44" fill="url(#bg)"/>
    </svg>
  </div>
</body>
</html>
