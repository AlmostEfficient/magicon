<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 1024px;
    overflow: hidden;
    background: #E9B31A;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    font-family: Georgia, "Times New Roman", serif;
    /* Subtle grain via layered gradient */
    background-image:
      radial-gradient(circle at 25% 30%, rgba(255,255,255,0.06) 0%, transparent 55%),
      radial-gradient(circle at 75% 70%, rgba(0,0,0,0.04) 0%, transparent 45%);
    background-color: #E9B31A;
  }

  .eyebrow {
    font-size: 38px;
    font-weight: 400;
    font-style: normal;
    color: rgba(18,12,2,0.45);
    letter-spacing: 10px;
    text-transform: uppercase;
    font-family: -apple-system, system-ui, sans-serif;
    margin-bottom: -8px;
  }

  .main-text {
    font-size: 292px;
    font-weight: 700;
    font-style: italic;
    color: #120C02;
    letter-spacing: -10px;
    line-height: 0.9;
  }

  /* Wavy hand-drawn underline via SVG */
  .underline-svg {
    margin-top: 4px;
  }

  .sub {
    font-size: 44px;
    font-weight: 400;
    font-style: italic;
    color: rgba(18,12,2,0.40);
    letter-spacing: 1px;
    margin-top: 4px;
    font-family: -apple-system, system-ui, sans-serif;
  }
</style>
</head>
<body>
  <div class="eyebrow">make</div>
  <div class="main-text">plans</div>
  <svg class="underline-svg" width="560" height="28" viewBox="0 0 560 28">
    <path
      d="M 8,20 C 50,4 100,28 150,14 C 200,0 250,24 300,14 C 350,4 400,26 450,14 C 490,5 530,22 552,16"
      fill="none"
      stroke="#120C02"
      stroke-width="5"
      stroke-linecap="round"
      opacity="0.55"
    />
  </svg>
  <div class="sub">not excuses</div>
</body>
</html>
