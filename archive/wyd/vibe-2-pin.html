<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 1024px;
    overflow: hidden;
    background: #0D1B2E;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "SF Pro Display", system-ui, sans-serif;
  }

  .scene {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 52px;
    margin-top: -64px;
  }

  .pin {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .pin-head {
    width: 290px;
    height: 290px;
    border-radius: 50%;
    background: #FFFFFF;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 70px rgba(255,255,255,0.10),
      0 10px 50px rgba(0,0,0,0.45);
    position: relative;
    z-index: 2;
  }

  .pin-dot {
    width: 116px;
    height: 116px;
    border-radius: 50%;
    background: #E8503A;
    box-shadow: 0 0 32px rgba(232,80,58,0.55);
  }

  .pin-stem {
    width: 0;
    height: 0;
    border-left: 58px solid transparent;
    border-right: 58px solid transparent;
    border-top: 144px solid #FFFFFF;
    margin-top: -4px;
    position: relative;
    z-index: 1;
  }

  .pin-shadow {
    width: 88px;
    height: 18px;
    background: rgba(0,0,0,0.35);
    border-radius: 50%;
    margin-top: 10px;
    filter: blur(7px);
  }

  .label {
    font-size: 100px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: -3px;
  }
</style>
</head>
<body>
  <div class="scene">
    <div class="pin">
      <div class="pin-head">
        <div class="pin-dot"></div>
      </div>
      <div class="pin-stem"></div>
      <div class="pin-shadow"></div>
    </div>
    <div class="label">plans</div>
  </div>
</body>
</html>
