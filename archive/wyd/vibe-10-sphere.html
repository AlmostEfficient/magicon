<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 1024px;
    overflow: hidden;
    background: #F3EEE5;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /*
    Warm-to-cool gradient sphere.
    Light source from upper-left: warm golden highlight.
    Shadow falls lower-right: deep indigo/near-black.
    No text — pure editorial object.
  */

  .sphere {
    width: 660px;
    height: 660px;
    border-radius: 50%;
    background: radial-gradient(
      circle at 33% 28%,
      #F5D898 0%,
      #E8A84A 18%,
      #C46830 36%,
      #8A3E60 55%,
      #3A2880 74%,
      #160F40 90%,
      #08061A 100%
    );
    box-shadow:
      /* cast shadow on paper */
      32px 48px 80px rgba(0,0,0,0.18),
      12px 20px 40px rgba(0,0,0,0.10),
      /* inner depth */
      inset 0 0 60px rgba(0,0,0,0.12),
      /* highlight edge refraction */
      inset -6px 6px 20px rgba(255,255,255,0.06);
  }
</style>
</head>
<body>
  <div class="sphere"></div>
</body>
</html>
