<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 1024px;
    overflow: hidden;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, system-ui, "SF Pro Display", sans-serif;
  }

  /*
    Concept: the app icon IS a notification badge.
    That red circle that haunts you = "wyd?"
    Very Nikita-coded. Meta. Unavoidable.
  */

  .badge {
    width: 720px;
    height: 720px;
    border-radius: 50%;
    background: #FF3B30;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    position: relative;
    /* Subtle depth: not iOS-6 glossy, just a hint */
    box-shadow:
      inset 0 -6px 24px rgba(0,0,0,0.25),
      inset 0 4px 16px rgba(255,255,255,0.12);
  }

  .text {
    font-size: 186px;
    font-weight: 650;
    color: #ffffff;
    letter-spacing: -6px;
    line-height: 1;
    /* Optical center nudge */
    margin-top: 8px;
  }
</style>
</head>
<body>
  <div class="badge">
    <span class="text">wyd?</span>
  </div>
</body>
</html>
