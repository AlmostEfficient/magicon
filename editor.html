<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>wyd icon editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    color: #fff;
    font-family: -apple-system, system-ui, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  #canvas-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
  }

  #canvas {
    width: 1024px;
    height: 1024px;
    background: #000;
    border-radius: 22.5%;
    position: relative;
    overflow: hidden;
    transform-origin: center center;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 24px 80px rgba(0,0,0,0.8);
  }

  .bubble {
    position: absolute;
    border-radius: 38px;
    white-space: nowrap;
    font-weight: 500;
    letter-spacing: -2px;
    line-height: 1;
    color: rgba(255,255,255,0.84);
    background: #2C2C2E;
    font-size: 92px;
    padding: 36px 52px;
    cursor: grab;
    user-select: none;
    font-family: -apple-system, system-ui, "SF Pro Display", sans-serif;
    z-index: 2;
  }
  .bubble:active { cursor: grabbing; }
  .bubble.selected {
    box-shadow: 0 0 0 4px #0A84FF, 0 0 24px rgba(10,132,255,0.4);
    z-index: 50 !important;
  }

  .hero {
    position: absolute;
    background: #0A84FF;
    padding: 44px 64px;
    font-size: 108px;
    font-weight: 650;
    letter-spacing: -3px;
    border-radius: 44px;
    color: #fff;
    font-family: -apple-system, system-ui, "SF Pro Display", sans-serif;
    box-shadow: 0 0 80px rgba(10,132,255,0.6), 0 0 200px rgba(10,132,255,0.25);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 100;
    pointer-events: none;
    user-select: none;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px;
    background: #1a1a1a;
    border-left: 1px solid rgba(255,255,255,0.07);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    padding: 18px 16px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  #bubble-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
  }

  .b-row {
    display: flex;
    align-items: center;
    padding: 7px 14px;
    cursor: pointer;
    border-radius: 7px;
    margin: 0 6px;
    gap: 8px;
    transition: background 0.1s;
  }
  .b-row:hover { background: rgba(255,255,255,0.05); }
  .b-row.active { background: rgba(10,132,255,0.18); }
  .b-row-label { font-size: 14px; font-weight: 500; flex: 1; }
  .b-row-pos {
    font-size: 10px;
    color: rgba(255,255,255,0.3);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  /* ── Controls panel ── */
  #controls {
    border-top: 1px solid rgba(255,255,255,0.06);
    padding: 14px 16px;
  }

  #controls-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-bottom: 12px;
  }

  #no-selection {
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    text-align: center;
    padding: 8px 0 4px;
  }

  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .ctrl-row label {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    width: 44px;
    flex-shrink: 0;
  }
  .ctrl-row input[type=range] {
    flex: 1;
    accent-color: #0A84FF;
    height: 3px;
  }
  .ctrl-row .vl {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    width: 36px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .ctrl-row input[type=text] {
    flex: 1;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 5px 8px;
    color: #fff;
    font-size: 13px;
    outline: none;
  }
  .ctrl-row input[type=text]:focus {
    border-color: #0A84FF;
  }

  /* ── Export ── */
  #export {
    padding: 12px 16px 16px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  button {
    padding: 9px;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
    color: #fff;
  }
  button:hover { opacity: 0.82; }
  #btn-copy { background: #0A84FF; }
  #btn-reset { background: rgba(255,255,255,0.08); font-weight: 500; }

  #hint {
    font-size: 10px;
    color: rgba(255,255,255,0.18);
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<div id="canvas-wrap">
  <div id="canvas">
    <div class="hero">wyd?</div>
  </div>
</div>

<div id="sidebar">
  <div id="sidebar-title">bubbles</div>
  <div id="bubble-list"></div>

  <div id="controls">
    <div id="controls-title">selected</div>
    <div id="no-selection">click a bubble to edit</div>
    <div id="ctrl-fields" style="display:none">
      <div class="ctrl-row">
        <label>text</label>
        <input type="text" id="inp-text" placeholder="wyd?">
      </div>
      <div class="ctrl-row">
        <label>rotate</label>
        <input type="range" id="inp-rot" min="-30" max="30" step="1">
        <span class="vl" id="lbl-rot">0°</span>
      </div>
      <div class="ctrl-row">
        <label>opacity</label>
        <input type="range" id="inp-opa" min="30" max="100" step="1">
        <span class="vl" id="lbl-opa">84%</span>
      </div>
    </div>
  </div>

  <div id="export">
    <div id="hint">scroll canvas to zoom</div>
    <button id="btn-copy">Copy HTML</button>
    <button id="btn-reset">Reset all</button>
  </div>
</div>

<script>
const INITIAL = [
  { id:0,  text:'club?',    top:-15, left:-90,  rot:-22, opa:84 },
  { id:1,  text:'raves?',   top:36,  left:290,  rot:-5,  opa:84 },
  { id:2,  text:'free?',    top:-20, left:700,  rot:20,  opa:84 },
  { id:3,  text:'party?',   top:215, left:-82,  rot:-15, opa:84 },
  { id:4,  text:'tonight?', top:234, left:272,  rot:1,   opa:84 },
  { id:5,  text:'dance?',   top:190, left:762,  rot:16,  opa:84 },
  { id:6,  text:'after?',   top:428, left:-130, rot:8,   opa:84 },
  { id:7,  text:'out?',     top:368, left:722,  rot:-9,  opa:84 },
  { id:8,  text:'events?',  top:538, left:848,  rot:-13, opa:84 },
  { id:9,  text:'plans?',   top:638, left:-98,  rot:13,  opa:84 },
  { id:10, text:'concert?', top:628, left:272,  rot:-2,  opa:84 },
  { id:11, text:'shows?',   top:832, left:52,   rot:-9,  opa:84 },
  { id:12, text:'brunch?',  top:844, left:526,  rot:15,  opa:84 },
];

let bubbles = INITIAL.map(b => ({...b}));
let selectedId = null;
let scale = 1;

const canvas   = document.getElementById('canvas');
const blist    = document.getElementById('bubble-list');
const noSel    = document.getElementById('no-selection');
const ctrlF    = document.getElementById('ctrl-fields');
const inpText  = document.getElementById('inp-text');
const inpRot   = document.getElementById('inp-rot');
const lblRot   = document.getElementById('lbl-rot');
const inpOpa   = document.getElementById('inp-opa');
const lblOpa   = document.getElementById('lbl-opa');

// ── Helpers ───────────────────────────────────────────

function getEl(id) {
  return canvas.querySelector(`[data-id="${id}"]`);
}

function applyStyle(b) {
  const el = getEl(b.id);
  if (!el) return;
  el.style.top       = b.top + 'px';
  el.style.left      = b.left + 'px';
  el.style.transform = `rotate(${b.rot}deg)`;
  el.style.opacity   = b.opa / 100;
  el.textContent     = b.text;
}

function setSelected(id) {
  // Remove old selection class
  canvas.querySelectorAll('.bubble.selected').forEach(el => el.classList.remove('selected'));
  blist.querySelectorAll('.b-row.active').forEach(el => el.classList.remove('active'));

  selectedId = id;

  if (id === null) {
    noSel.style.display = '';
    ctrlF.style.display = 'none';
    return;
  }

  getEl(id)?.classList.add('selected');
  blist.querySelector(`[data-row="${id}"]`)?.classList.add('active');

  const b = bubbles.find(x => x.id === id);
  noSel.style.display = 'none';
  ctrlF.style.display = '';
  inpText.value = b.text;
  inpRot.value  = b.rot;   lblRot.textContent = b.rot + '°';
  inpOpa.value  = b.opa;   lblOpa.textContent = b.opa + '%';
}

// ── Full render (create elements) ─────────────────────

function fullRender() {
  canvas.querySelectorAll('.bubble').forEach(el => el.remove());

  bubbles.forEach(b => {
    const el = document.createElement('div');
    el.className = 'bubble';
    el.dataset.id = b.id;
    el.textContent = b.text;
    applyStyle(b);
    canvas.appendChild(el);
    attachDrag(el, b);
  });

  renderList();
  setSelected(selectedId); // re-apply selection state
}

function renderList() {
  blist.innerHTML = '';
  bubbles.forEach(b => {
    const row = document.createElement('div');
    row.className = 'b-row' + (b.id === selectedId ? ' active' : '');
    row.dataset.row = b.id;
    row.innerHTML = `<span class="b-row-label">${b.text}</span><span class="b-row-pos" id="pos-${b.id}">${b.top}, ${b.left}</span>`;
    row.addEventListener('click', () => setSelected(b.id === selectedId ? null : b.id));
    blist.appendChild(row);
  });
}

// ── Drag ──────────────────────────────────────────────

function attachDrag(el, b) {
  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    e.preventDefault();
    e.stopPropagation();

    setSelected(b.id);

    const startX    = e.clientX;
    const startY    = e.clientY;
    const startTop  = b.top;
    const startLeft = b.left;
    const dragScale = scale; // capture scale at drag start

    function onMove(e) {
      b.top  = Math.round(startTop  + (e.clientY - startY)  / dragScale);
      b.left = Math.round(startLeft + (e.clientX - startX) / dragScale);
      // Update element directly — no re-render
      el.style.top  = b.top  + 'px';
      el.style.left = b.left + 'px';
      // Update sidebar pos label
      const posEl = document.getElementById(`pos-${b.id}`);
      if (posEl) posEl.textContent = `${b.top}, ${b.left}`;
    }

    function onUp() {
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

// ── Controls ──────────────────────────────────────────

inpText.addEventListener('input', () => {
  const b = bubbles.find(x => x.id === selectedId);
  if (!b) return;
  b.text = inpText.value;
  // Update element text and sidebar label
  const el = getEl(b.id);
  if (el) el.textContent = b.text;
  const row = blist.querySelector(`[data-row="${b.id}"] .b-row-label`);
  if (row) row.textContent = b.text;
});

inpRot.addEventListener('input', () => {
  const b = bubbles.find(x => x.id === selectedId);
  if (!b) return;
  b.rot = parseInt(inpRot.value);
  lblRot.textContent = b.rot + '°';
  const el = getEl(b.id);
  if (el) el.style.transform = `rotate(${b.rot}deg)`;
});

inpOpa.addEventListener('input', () => {
  const b = bubbles.find(x => x.id === selectedId);
  if (!b) return;
  b.opa = parseInt(inpOpa.value);
  lblOpa.textContent = b.opa + '%';
  const el = getEl(b.id);
  if (el) el.style.opacity = b.opa / 100;
});

// Deselect on canvas background click
canvas.addEventListener('mousedown', e => {
  if (e.target === canvas || e.target.classList.contains('hero')) {
    setSelected(null);
  }
});

// ── Zoom ──────────────────────────────────────────────

function fitCanvas() {
  const pad = 80;
  const avail = Math.min(
    document.getElementById('canvas-wrap').clientWidth,
    document.getElementById('canvas-wrap').clientHeight
  ) - pad;
  scale = Math.min(1, avail / 1024);
  canvas.style.transform = `scale(${scale})`;
}

document.getElementById('canvas-wrap').addEventListener('wheel', e => {
  e.preventDefault();
  scale = Math.max(0.25, Math.min(1.3, scale - e.deltaY * 0.0008));
  canvas.style.transform = `scale(${scale})`;
}, { passive: false });

window.addEventListener('resize', fitCanvas);

// ── Export ────────────────────────────────────────────

document.getElementById('btn-copy').addEventListener('click', () => {
  const lines = bubbles.map(b =>
    `<div class="b" style="top:${b.top}px; left:${b.left}px; transform:rotate(${b.rot}deg); opacity:${(b.opa/100).toFixed(2)}">${b.text}</div>`
  ).join('\n');
  const out = `${lines}\n\n<div class="hero">wyd?</div>`;
  navigator.clipboard.writeText(out).then(() => {
    const btn = document.getElementById('btn-copy');
    btn.textContent = 'Copied ✓';
    setTimeout(() => btn.textContent = 'Copy HTML', 1600);
  });
});

document.getElementById('btn-reset').addEventListener('click', () => {
  bubbles = INITIAL.map(b => ({...b}));
  selectedId = null;
  fullRender();
});

// ── Init ──────────────────────────────────────────────
fitCanvas();
fullRender();
</script>
</body>
</html>
