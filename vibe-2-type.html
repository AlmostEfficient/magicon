<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 1024px;
    overflow: hidden;
    background: #0C0C0E;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, system-ui, "SF Pro Display", sans-serif;
    position: relative;
  }

  /* Poems-style: text so big it bleeds off edges, rotated */
  .canvas {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .words {
    position: absolute;
    /* center then offset + rotate like PoemsAppIcon does */
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-7deg) translateY(-40px);
    white-space: nowrap;
    display: flex;
    flex-direction: column;
    gap: 0;
    line-height: 0.88;
  }

  .line {
    font-size: 248px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -10px;
    line-height: 0.88;
  }

  .line.dim {
    color: rgba(255,255,255,0.15);
  }

  /* Small label anchored bottom-center */
  .label {
    position: absolute;
    bottom: 68px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 28px;
    font-weight: 500;
    color: rgba(255,255,255,0.35);
    letter-spacing: 8px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="canvas">
    <div class="words">
      <!-- Three rows of "wyd" — middle one fully visible, others bleed off -->
      <div class="line dim">wyd</div>
      <div class="line">wyd</div>
      <div class="line dim">wyd</div>
    </div>
    <div class="label">tonight</div>
  </div>
</body>
</html>
