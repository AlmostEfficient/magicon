<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 1024px;
    overflow: hidden;
    /* brat green. you know this color. */
    background: #8ACE00;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, "Helvetica Neue", sans-serif;
    /* Arial intentionally — brat album uses plain Arial */
  }

  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    gap: 0;
  }

  .main {
    font-size: 260px;
    font-weight: 700;
    color: #000000;
    letter-spacing: -12px;
    line-height: 0.85;
    text-transform: lowercase;
    /* Slightly blurry like the album text — on purpose */
    filter: blur(1.2px);
  }

  /* "tonight?" as a second line, same treatment */
  .sub {
    font-size: 108px;
    font-weight: 700;
    color: #000000;
    letter-spacing: -5px;
    line-height: 1;
    margin-top: 8px;
    text-transform: lowercase;
    filter: blur(1.2px);
    opacity: 0.85;
  }
</style>
</head>
<body>
  <div class="center">
    <div class="main">wyd</div>
    <div class="sub">tonight?</div>
  </div>
</body>
</html>
