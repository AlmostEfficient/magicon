<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1024px;
    height: 1024px;
    overflow: hidden;
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, system-ui, "SF Pro Display", sans-serif;
  }

  .bubble-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .bubble {
    background: #0A84FF;
    border-radius: 50px 50px 50px 14px;
    padding: 52px 72px 56px;
    position: relative;
  }

  /* Tail: a small rotated shape in the bottom-left */
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -26px;
    left: 0;
    width: 52px;
    height: 36px;
    background: #0A84FF;
    border-radius: 0 0 0 18px;
    clip-path: polygon(0 0, 100% 0, 0 100%);
  }

  .text {
    font-size: 172px;
    font-weight: 590;
    color: #ffffff;
    line-height: 1;
    letter-spacing: -6px;
    /* nudge optical centering */
    margin-top: 2px;
  }
</style>
</head>
<body>
  <div class="bubble-wrap">
    <div class="bubble">
      <span class="text">wyd?</span>
    </div>
  </div>
</body>
</html>
